{% extends "base.html" %}

{% block title %}Log In - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <h2>Log in</h2>

  <div class="progress-summary" style="margin-top: 1rem;">
    <form method="post">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" autofocus required>

      <label for="cohort_code">Cohort code</label>
      <input id="cohort_code" name="cohort_code" type="text" autocomplete="off" required>

      <button type="submit">Log in</button>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
  </div>
{% endblock %}
