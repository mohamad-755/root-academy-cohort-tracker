{% extends "base.html" %}

{% block title %}Log In - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <h2>Log in</h2>

  <form method="post">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <label for="cohort_code">Cohort code</label>
    <input id="cohort_code" name="cohort_code" type="text" required>

    <button type="submit">Log in</button>
  </form>
{% endblock %}
