{% extends "base.html" %}

{% block title %}Register - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <h2>Register</h2>

  <div class="progress-summary" style="margin-top: 1rem;">
    <form method="post">
      
      <label for="name">Name</label>
      <input id="name" name="name" type="text" autocomplete="name" autofocus required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="cohort_code">Cohort code</label>
      <input id="cohort_code" name="cohort_code" type="password" autocomplete="new-password" required>
      <button type="submit">Create account</button>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
  </div>
{% endblock %}
