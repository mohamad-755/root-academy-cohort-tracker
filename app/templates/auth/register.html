{% extends "base.html" %}

{% block title %}Register - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <h2>Register</h2>

  <form method="post">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <label for="cohort_code">Cohort code</label>
    <input id="cohort_code" name="cohort_code" type="text" required>

    <button type="submit">Create account</button>
  </form>
{% endblock %}
