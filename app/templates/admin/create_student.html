{% extends "base.html" %}

{% block title %}Add Student - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <p><a href="{{ url_for('admin.dashboard') }}">Back to dashboard</a></p>

  <h2>Add student</h2>

  <div class="progress-summary" style="margin-top: 1rem;">
    <form method="post">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" autocomplete="name" autofocus required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="access_code">Personal access code</label>
      <input id="access_code" name="access_code" type="text" autocomplete="off">

      <p class="form-note">Leave blank to generate a secure access code automatically.</p>

      <button type="submit">Create student</button>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
  </div>
{% endblock %}
