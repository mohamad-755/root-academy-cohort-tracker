{% extends "base.html" %}

{% block title %}Admin Login - Root Academy Cohort Tracker{% endblock %}

{% block content %}
  <h2>Admin login</h2>

  <div class="progress-summary" style="margin-top: 1rem;">
    <form method="post">
      <label for="admin_code">Admin code</label>
      <input id="admin_code" name="admin_code" type="password" required autofocus>

      <button type="submit">Log in as admin</button>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
  </div>
{% endblock %}
